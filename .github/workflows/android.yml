name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "build-tools;34.0.0" "platforms;android-34"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper
        working-directory: android-native
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android-native
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        working-directory: android-native
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-debug-apk
          path: android-native/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-release-apk-unsigned
          path: android-native/app/build/outputs/apk/release/*.apk
          retention-days: 30
