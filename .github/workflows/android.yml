name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          sdkmanager --install "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust library for Android (arm64)
        run: |
          cargo ndk \
            -t arm64-v8a \
            --platform 26 \
            -o android/app/src/main/jniLibs \
            --link-libcxx-shared \
            build --release -p word_wheel_android

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
