name: Build Android APK & AAB

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
    paths:
      - 'android-native/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-native/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - debug
          - release
          - bundle
          - all

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validate level data integrity BEFORE the slow build steps so
      # broken puzzles fail fast and don't burn an Android SDK download.
      # Tests:
      #   - every crossword word in every level connects to another
      #     (no isolated/floating words in the grid)
      #   - every answer is spellable from the wheel letters
      #   - no conflicting letters at shared cells
      - name: Validate level data
        run: python3 tools/validate_levels.py

      # Belt-and-braces: catch the case where someone edits the deny-list
      # or supplement but forgets to regenerate the bundled dictionary.
      # `--check` exits non-zero if the build output diverges from the
      # canonical assets/dictionary.txt that's checked in.
      - name: Validate bundled dictionary
        run: python3 tools/dictionary/build_dictionary.py --check

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "build-tools;34.0.0" "platforms;android-34"

      # Generate a deterministic debug keystore so the debug APK
      # signature is consistent across CI runs. Used for the debug build
      # and as the fallback when no production upload key is configured.
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -alias androiddebugkey \
              -keypass android \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

      # Decode the upload keystore from a base64-encoded GitHub Secret.
      # When all four secrets are present, the release build is signed
      # with the production upload key. Otherwise the build silently
      # falls back to the debug keystore (good for PR CI from forks
      # where secrets are intentionally unavailable).
      #
      # Setup: see android-native/SIGNING.md for how to generate the
      # keystore and register the secrets.
      - name: Decode upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$UPLOAD_KEYSTORE_BASE64" ]; then
            mkdir -p "$RUNNER_TEMP/keystore"
            KEYSTORE_PATH="$RUNNER_TEMP/keystore/upload.jks"
            echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            # Sanity-check: keytool must be able to read it.
            keytool -list -keystore "$KEYSTORE_PATH" \
              -storepass "${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}" \
              > /dev/null 2>&1 \
              && echo "✓ Upload keystore decoded and verified" \
              || (echo "✗ Upload keystore failed to verify"; exit 1)
            echo "UPLOAD_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "::add-mask::$KEYSTORE_PATH"
          else
            echo "ℹ No UPLOAD_KEYSTORE_BASE64 secret — release will fall back to debug signing"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-native/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper
        working-directory: android-native
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' || inputs.build_type == 'all'
        working-directory: android-native
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release' || inputs.build_type == 'all'
        working-directory: android-native
        env:
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # AAB (Android App Bundle) — the format Google Play requires for
      # upload. It lets Play generate per-device APKs, shrinking the
      # download users actually see.
      - name: Build release AAB (bundle)
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'bundle' || inputs.build_type == 'all'
        working-directory: android-native
        env:
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Verify APKs are signed
        if: always()
        working-directory: android-native
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
          for apk in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              echo "=== $(basename $apk) ==="
              if [ -n "$APKSIGNER" ]; then
                $APKSIGNER verify --print-certs "$apk" || echo "✗ NOT SIGNED"
                # Flag debug-signed release builds — easy to confuse with
                # production builds and cause Play Console upload friction.
                CERT=$($APKSIGNER verify --print-certs "$apk" 2>/dev/null | grep "DN:" | head -1)
                if echo "$apk" | grep -q "/release/" && echo "$CERT" | grep -qi "Android Debug"; then
                  echo "⚠️  Release APK is signed with the DEBUG keystore — not suitable for Play Store."
                else
                  echo "✓ Signed"
                fi
              else
                echo "⚠ apksigner not found, skipping signature check"
              fi
            fi
          done

      - name: Report build sizes
        if: always()
        working-directory: android-native
        run: |
          echo "## Android Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Size | Path |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in \
              app/build/outputs/apk/debug/*.apk \
              app/build/outputs/apk/release/*.apk \
              app/build/outputs/bundle/release/*.aab; do
            if [ -f "$f" ]; then
              size=$(du -h "$f" | cut -f1)
              echo "| $(basename $(dirname $f)) | $size | $f |" >> $GITHUB_STEP_SUMMARY
              echo "$(basename $f): $size"
            fi
          done

      - name: Upload debug APK
        if: always() && hashFiles('android-native/app/build/outputs/apk/debug/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-debug-apk
          path: android-native/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        if: always() && hashFiles('android-native/app/build/outputs/apk/release/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-release-apk
          path: android-native/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Upload AAB — this is the file you drag into Play Console.
      - name: Upload release AAB
        if: always() && hashFiles('android-native/app/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: word-wheel-release-aab
          path: android-native/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android-native/app/build/reports/
            android-native/app/build/outputs/logs/
          retention-days: 7
