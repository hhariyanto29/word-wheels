# XcodeGen config — generates WordWheel.xcodeproj
# Install XcodeGen: brew install xcodegen
# Regenerate: cd ios-native && xcodegen generate
name: WordWheel
options:
  bundleIdPrefix: com.wordwheel
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  xcodeVersion: "15.4"
  # objectVersion 56 maps to Xcode 15.x — newer XcodeGen releases default to
  # objectVersion 77 which only Xcode 16+ can open.
  objectVersion: 56
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  WordWheel:
    type: application
    platform: iOS
    sources:
      - path: WordWheel
        excludes:
          - "Info.plist"
    resources:
      - path: WordWheel/Resources
      - path: WordWheel/Assets.xcassets
    info:
      path: WordWheel/Info.plist
      properties:
        CFBundleDisplayName: Word Wheel
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordwheel.game
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
