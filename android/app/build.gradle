plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wordwheel.game'
    compileSdk 34

    defaultConfig {
        applicationId "com.wordwheel.game"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.1.0"
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}

dependencies {
    implementation 'androidx.games:games-activity:2.0.2'
}
