<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Wheel</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #3C64C8;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #loading_text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            font-size: 24px;
            color: white;
        }
    </style>
</head>
<body>
    <p id="loading_text">Loading...</p>
    <canvas id="word_wheel_canvas"></canvas>
    <link data-trunk rel="rust" data-wasm-opt="2" />
</body>
</html>
